<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>도트 연결 게임 (Dots and Boxes)</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
        <style>
            /* 모바일 터치 시 하이라이트 잔상 제거 */
            -webkit-tap-highlight-color: transparent;
        </style>
    </head>
    <body
        class="bg-slate-900 text-white font-sans h-[100dvh] min-h-[100dvh] flex flex-col justify-between select-none overflow-x-hidden overflow-y-auto"
    >
        <div
            id="p1-panel"
            class="w-full py-4 px-6 bg-blue-900/40 border-b border-blue-500/30 flex justify-between items-center transition-all duration-300"
            style="padding-top: calc(1rem + env(safe-area-inset-top))"
        >
            <div>
                <h2
                    class="text-xs uppercase tracking-wider text-blue-400 font-bold"
                >
                    Player 1
                </h2>
                <p class="text-2xl font-black text-blue-300" id="p1-score">0</p>
            </div>
            <div
                id="p1-turn-indicator"
                class="text-sm font-bold bg-blue-500 text-white px-3 py-1 rounded-full animate-pulse hidden"
            >
                내 턴
            </div>
        </div>

        <main class="flex-1 flex flex-col items-center justify-center p-4">
            <div class="text-center mb-6">
                <h1
                    class="text-xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-red-400 bg-clip-text text-transparent"
                >
                    DOTS & BOXES
                </h1>
                <p id="status-message" class="text-sm text-slate-400 mt-1">
                    게임을 시작합니다.
                </p>
            </div>

            <div
                class="relative bg-slate-800/50 p-6 rounded-2xl border border-slate-700/50 shadow-2xl touch-none"
                id="board-container"
            >
                <div id="game-board" class="relative"></div>
            </div>

            <button
                id="reset-btn"
                class="mt-8 px-6 py-2.5 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-xl text-sm font-medium tracking-wide active:scale-95 transition-all"
            >
                게임 다시하기
            </button>
        </main>

        <div
            id="p2-panel"
            class="w-full py-4 px-6 bg-red-900/40 border-t border-red-500/30 flex justify-between items-center transition-all duration-300"
            style="padding-bottom: calc(1rem + env(safe-area-inset-bottom))"
        >
            <div>
                <h2
                    class="text-xs uppercase tracking-wider text-red-400 font-bold"
                >
                    Player 2
                </h2>
                <p class="text-2xl font-black text-red-300" id="p2-score">0</p>
            </div>
            <div
                id="p2-turn-indicator"
                class="text-sm font-bold bg-red-500 text-white px-3 py-1 rounded-full animate-pulse hidden"
            >
                내 턴
            </div>
        </div>

        <script>
            // 게임 설정 (4x4 박스를 만들기 위해 5x5 도트 생성)
            const ROWS = 4;
            const COLS = 4;
            const DOT_SIZE = 12; // 도트 크기 (px)
            const baseCellSize = 65; // 기본 박스 한 칸 크기 (px)
            let cellSize = baseCellSize;

            let currentPlayer = 1; // 1: Player 1 (Blue), 2: Player 2 (Red)
            let scores = { 1: 0, 2: 0 };

            // 선과 박스의 상태를 저장할 객체
            let hLines = {}; // 가로선 상태
            let vLines = {}; // 세로선 상태
            let boxes = {}; // 박스 점령 상태

            const board = document.getElementById("game-board");
            const statusMsg = document.getElementById("status-message");
            const p1ScoreEl = document.getElementById("p1-score");
            const p2ScoreEl = document.getElementById("p2-score");
            const p1Panel = document.getElementById("p1-panel");
            const p2Panel = document.getElementById("p2-panel");
            const p1Indicator = document.getElementById("p1-turn-indicator");
            const p2Indicator = document.getElementById("p2-turn-indicator");

            // 기기 화면에 맞춰 보드 셀 크기를 계산
            function getResponsiveCellSize() {
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                const boardHorizontalPadding = 48; // board-container p-6 * 2
                const mainHorizontalPadding = 32; // main p-4 * 2
                const reservedWidth =
                    boardHorizontalPadding + mainHorizontalPadding;

                const topPanelHeight = p1Panel.offsetHeight;
                const bottomPanelHeight = p2Panel.offsetHeight;
                const mainVerticalPadding = 32; // main p-4 * 2
                const titleAreaHeight = 84; // 타이틀 + 상태 텍스트 영역
                const buttonAreaHeight = 72; // 버튼 높이 + 상단 마진
                const extraGap = 20;

                const availableBoardWidth = Math.max(
                    220,
                    viewportWidth - reservedWidth,
                );
                const availableBoardHeight = Math.max(
                    220,
                    viewportHeight -
                        topPanelHeight -
                        bottomPanelHeight -
                        mainVerticalPadding -
                        titleAreaHeight -
                        buttonAreaHeight -
                        extraGap,
                );

                const maxBoardSize = Math.min(
                    availableBoardWidth,
                    availableBoardHeight,
                );
                const calculatedCellSize = Math.floor(
                    (maxBoardSize - DOT_SIZE) / COLS,
                );

                return Math.max(44, Math.min(baseCellSize, calculatedCellSize));
            }

            // 초기화 함수
            function initGame() {
                board.innerHTML = "";
                currentPlayer = 1;
                scores = { 1: 0, 2: 0 };
                hLines = {};
                vLines = {};
                boxes = {};
                cellSize = getResponsiveCellSize();

                // 보드 전체 사이즈 설정
                board.style.width = `${COLS * cellSize + DOT_SIZE}px`;
                board.style.height = `${ROWS * cellSize + DOT_SIZE}px`;

                // 1. 박스(지형) 레이어 먼저 생성
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const box = document.createElement("div");
                        box.id = `box-${r}-${c}`;
                        box.className =
                            "absolute rounded transition-all duration-500 flex items-center justify-center font-black text-xl opacity-0 scale-75 bg-transparent";
                        box.style.top = `${r * cellSize + DOT_SIZE}px`;
                        box.style.left = `${c * cellSize + DOT_SIZE}px`;
                        box.style.width = `${cellSize - DOT_SIZE}px`;
                        box.style.height = `${cellSize - DOT_SIZE}px`;
                        board.appendChild(box);
                        boxes[`${r}-${c}`] = 0; // 미점령
                    }
                }

                // 2. 가로선 생성 및 이벤트 바인딩
                for (let r = 0; r <= ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const lineKey = `${r}-${c}`;
                        hLines[lineKey] = 0;

                        const lineContainer = document.createElement("div");
                        lineContainer.className =
                            "absolute cursor-pointer flex items-center justify-center";
                        // 모바일 터치 영역 확장을 위해 패딩 성격의 크기 설정
                        lineContainer.style.top = `${r * cellSize - 10}px`;
                        lineContainer.style.left = `${c * cellSize + DOT_SIZE}px`;
                        lineContainer.style.width = `${cellSize - DOT_SIZE}px`;
                        lineContainer.style.height = `${DOT_SIZE + 20}px`;

                        const visualLine = document.createElement("div");
                        visualLine.id = `hline-${lineKey}`;
                        visualLine.className =
                            "w-full bg-slate-700/40 rounded-full transition-all duration-200";
                        visualLine.style.height = "4px";

                        lineContainer.appendChild(visualLine);
                        board.appendChild(lineContainer);

                        // 클릭/터치 이벤트
                        lineContainer.addEventListener("click", () =>
                            handleLineClick("h", r, c),
                        );
                    }
                }

                // 3. 세로선 생성 및 이벤트 바인딩
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c <= COLS; c++) {
                        const lineKey = `${r}-${c}`;
                        vLines[lineKey] = 0;

                        const lineContainer = document.createElement("div");
                        lineContainer.className =
                            "absolute cursor-pointer flex items-center justify-center";
                        lineContainer.style.top = `${r * cellSize + DOT_SIZE}px`;
                        lineContainer.style.left = `${c * cellSize - 10}px`;
                        lineContainer.style.width = `${DOT_SIZE + 20}px`;
                        lineContainer.style.height = `${cellSize - DOT_SIZE}px`;

                        const visualLine = document.createElement("div");
                        visualLine.id = `vline-${lineKey}`;
                        visualLine.className =
                            "h-full bg-slate-700/40 rounded-full transition-all duration-200";
                        visualLine.style.width = "4px";

                        lineContainer.appendChild(visualLine);
                        board.appendChild(lineContainer);

                        lineContainer.addEventListener("click", () =>
                            handleLineClick("v", r, c),
                        );
                    }
                }

                // 4. 고정 도트(점) 생성
                for (let r = 0; r <= ROWS; r++) {
                    for (let c = 0; c <= COLS; c++) {
                        const dot = document.createElement("div");
                        dot.className =
                            "absolute bg-slate-400 rounded-full shadow-md z-10";
                        dot.style.top = `${r * cellSize}px`;
                        dot.style.left = `${c * cellSize}px`;
                        dot.style.width = `${DOT_SIZE}px`;
                        dot.style.height = `${DOT_SIZE}px`;
                        board.appendChild(dot);
                    }
                }

                updateUI();
            }

            // 선 클릭 제어
            function handleLineClick(type, r, c) {
                const key = `${r}-${c}`;
                if (type === "h" && hLines[key] !== 0) return;
                if (type === "v" && vLines[key] !== 0) return;

                // 선 점령 상태 업데이트
                if (type === "h") {
                    hLines[key] = currentPlayer;
                    const el = document.getElementById(`hline-${key}`);
                    el.className = `w-full rounded-full ${currentPlayer === 1 ? "bg-blue-500 shadow-[0_0_8px_#3b82f6]" : "bg-red-500 shadow-[0_0_8px_#ef4444]"}`;
                    el.style.height = "6px";
                } else {
                    vLines[key] = currentPlayer;
                    const el = document.getElementById(`vline-${key}`);
                    el.className = `h-full rounded-full ${currentPlayer === 1 ? "bg-blue-500 shadow-[0_0_8px_#3b82f6]" : "bg-red-500 shadow-[0_0_8px_#ef4444]"}`;
                    el.style.width = "6px";
                }

                // 사각형 완성 여부 체크
                const boxesFormed = checkBoxes(type, r, c);

                if (boxesFormed > 0) {
                    // 사각형을 완성했다면 점수 추가 및 턴 유지
                    scores[currentPlayer] += boxesFormed;
                    checkGameOver();
                } else {
                    // 완성하지 못했다면 턴 전환
                    currentPlayer = currentPlayer === 1 ? 2 : 1;
                }

                updateUI();
            }

            // 선이 그어졌을 때 영향을 받는 주변 박스 검사
            function checkBoxes(type, r, c) {
                let formed = 0;

                if (type === "h") {
                    // 위쪽 박스 검사 (r-1, c)
                    if (r > 0 && isBoxComplete(r - 1, c)) {
                        claimBox(r - 1, c);
                        formed++;
                    }
                    // 아래쪽 박스 검사 (r, c)
                    if (r < ROWS && isBoxComplete(r, c)) {
                        claimBox(r, c);
                        formed++;
                    }
                } else {
                    // 왼쪽 박스 검사 (r, c-1)
                    if (c > 0 && isBoxComplete(r, c - 1)) {
                        claimBox(r, c - 1);
                        formed++;
                    }
                    // 오른쪽 박스 검사 (r, c)
                    if (c < COLS && isBoxComplete(r, c)) {
                        claimBox(r, c);
                        formed++;
                    }
                }
                return formed;
            }

            // 특정 박스의 4면이 다 막혔는지 판별
            function isBoxComplete(r, c) {
                return (
                    hLines[`${r}-${c}`] !== 0 && // 상
                    hLines[`${r + 1}-${c}`] !== 0 && // 하
                    vLines[`${r}-${c}`] !== 0 && // 좌
                    vLines[`${r}-${c + 1}`] !== 0 // 우
                );
            }

            // 박스 소유권 부여 및 이펙트
            function claimBox(r, c) {
                boxes[`${r}-${c}`] = currentPlayer;
                const boxEl = document.getElementById(`box-${r}-${c}`);

                if (currentPlayer === 1) {
                    boxEl.className =
                        "absolute rounded flex items-center justify-center font-black text-xl bg-blue-500/20 text-blue-400 border border-blue-500/30 opacity-100 scale-100 transition-all duration-300";
                    boxEl.innerText = "P1";
                } else {
                    boxEl.className =
                        "absolute rounded flex items-center justify-center font-black text-xl bg-red-500/20 text-red-400 border border-red-500/30 opacity-100 scale-100 transition-all duration-300";
                    boxEl.innerText = "P2";
                }
            }

            // UI 상태 동기화 (점수판 및 활성화 패널 강조)
            function updateUI() {
                p1ScoreEl.innerText = scores[1];
                p2ScoreEl.innerText = scores[2];

                if (currentPlayer === 1) {
                    p1Panel.classList.add("bg-blue-800/80", "border-blue-400");
                    p1Indicator.classList.remove("hidden");
                    p2Panel.classList.remove("bg-red-800/80", "border-red-400");
                    p2Indicator.classList.add("hidden");
                    statusMsg.innerText = "Player 1 (블루)의 턴입니다.";
                    statusMsg.className =
                        "text-sm font-semibold text-blue-400 mt-1";
                } else {
                    p2Panel.classList.add("bg-red-800/80", "border-red-400");
                    p2Indicator.classList.remove("hidden");
                    p1Panel.classList.remove(
                        "bg-blue-800/80",
                        "border-blue-400",
                    );
                    p1Indicator.classList.add("hidden");
                    statusMsg.innerText = "Player 2 (레드)의 턴입니다.";
                    statusMsg.className =
                        "text-sm font-semibold text-red-400 mt-1";
                }
            }

            // 폭죽 효과
            function launchConfetti(colors) {
                const duration = 3000;
                const end = Date.now() + duration;
                (function frame() {
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: colors,
                    });
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: colors,
                    });
                    if (Date.now() < end) requestAnimationFrame(frame);
                })();
            }

            // 게임 종료 판정
            function checkGameOver() {
                const totalBoxes = ROWS * COLS;
                const currentFilled = scores[1] + scores[2];

                if (currentFilled === totalBoxes) {
                    setTimeout(() => {
                        if (scores[1] > scores[2]) {
                            launchConfetti(["#3b82f6", "#93c5fd", "#ffffff"]);
                            statusMsg.innerText = "🏆 Player 1 승리!";
                            Swal.fire({
                                title: "🎉 Player 1 승리!",
                                html: `<span style="color:#93c5fd">블루</span>가 <b>${scores[1]}</b> : ${scores[2]} 으로 이겼습니다!`,
                                icon: "success",
                                background: "#1e293b",
                                color: "#e2e8f0",
                                confirmButtonColor: "#3b82f6",
                                confirmButtonText: "다시하기",
                                showCancelButton: true,
                                cancelButtonText: "닫기",
                                cancelButtonColor: "#475569",
                            }).then((result) => {
                                if (result.isConfirmed) initGame();
                            });
                        } else if (scores[2] > scores[1]) {
                            launchConfetti(["#ef4444", "#fca5a5", "#ffffff"]);
                            statusMsg.innerText = "🏆 Player 2 승리!";
                            Swal.fire({
                                title: "🎉 Player 2 승리!",
                                html: `<span style="color:#fca5a5">레드</span>가 <b>${scores[2]}</b> : ${scores[1]} 으로 이겼습니다!`,
                                icon: "success",
                                background: "#1e293b",
                                color: "#e2e8f0",
                                confirmButtonColor: "#ef4444",
                                confirmButtonText: "다시하기",
                                showCancelButton: true,
                                cancelButtonText: "닫기",
                                cancelButtonColor: "#475569",
                            }).then((result) => {
                                if (result.isConfirmed) initGame();
                            });
                        } else {
                            launchConfetti([
                                "#3b82f6",
                                "#ef4444",
                                "#a855f7",
                                "#ffffff",
                            ]);
                            statusMsg.innerText = "무승부!";
                            Swal.fire({
                                title: "🤝 무승부!",
                                html: `두 플레이어 모두 <b>${scores[1]}</b>점으로 동점입니다!`,
                                icon: "info",
                                background: "#1e293b",
                                color: "#e2e8f0",
                                confirmButtonColor: "#6366f1",
                                confirmButtonText: "다시하기",
                                showCancelButton: true,
                                cancelButtonText: "닫기",
                                cancelButtonColor: "#475569",
                            }).then((result) => {
                                if (result.isConfirmed) initGame();
                            });
                        }
                    }, 300);
                }
            }

            document
                .getElementById("reset-btn")
                .addEventListener("click", initGame);

            // 첫 시작
            initGame();
        </script>
    </body>
</html>
